<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Portal Frete</title>
<script>
(function () {
  var tk = localStorage.getItem('frete_tk');
  var usr = null;
  try { usr = JSON.parse(localStorage.getItem('frete_usr') || 'null'); } catch (e) {}
  window.location.replace(tk && usr ? 'app.html' : 'login.html');
})();
</script>
</head>
<body>
<p style="font-family:system-ui,sans-serif;padding:24px;color:#5f716b">Redirecionando…</p>
</body>
</html>
