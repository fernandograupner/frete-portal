<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Portal Frete · Espelho de Frete</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#283533;--ink2:#3d4f49;--ink3:#5f716b;--ink4:#8fa39c;
  --paper:#ffffff;--paper2:#eff5f2;--paper3:#e3ece8;
  --line:#c9d9d3;--line2:#b5c9c1;
  --brand:#1f7a62;--brand-hover:#185848;--brand-soft:#dff0ea;--brand-line:#b8d9cc;
  --accent:#2f9d7e;
  --blue:#1d4ed8;--blue-l:#dbeafe;--blue-m:#2563eb;
  --teal:#0f766e;--teal-l:#d6f5ef;
  --amber:#a16207;--amber-l:#fef3c7;
  --red:#b91c1c;--red-l:#fee2e2;
  --green:#166534;--green-l:#dcfce7;
  --radius:4px;--radius-lg:8px;
  --shadow:0 1px 2px rgba(26,61,52,.06),0 1px 4px rgba(26,61,52,.06);
  --shadow-lg:0 4px 18px rgba(26,61,52,.08);
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono','Consolas',monospace;
  --font-head:'Inter',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);font-size:13px;color:var(--ink);background:var(--paper2);line-height:1.45}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--paper3)}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
#root,.app-shell{min-height:100vh;display:flex;flex-direction:column}
.topbar{height:48px;background:var(--paper);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--line);box-shadow:var(--shadow)}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-logo{width:30px;height:30px;background:var(--brand);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:700;font-size:12px;color:#fff;border:1px solid var(--brand-hover)}
.tb-name{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--ink);letter-spacing:.02em;text-transform:none}
.tb-name em{color:var(--brand);font-style:normal;font-weight:700}
.tb-nav{display:flex;gap:4px;padding:4px;background:var(--paper3);border-radius:var(--radius);border:1px solid var(--line)}
.tb-btn{padding:6px 14px;border-radius:3px;border:none;background:transparent;color:var(--ink3);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:background .15s,color .15s}
.tb-btn:hover{background:var(--paper);color:var(--ink)}
.tb-btn.on{background:var(--paper);color:var(--brand);box-shadow:0 1px 2px rgba(26,61,52,.08)}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-chip{padding:4px 10px;background:var(--brand-soft);border:1px solid var(--brand-line);border-radius:20px;font-size:11px;font-weight:600;color:var(--ink2)}
.tb-out{padding:5px 10px;border:1px solid var(--line2);border-radius:var(--radius);background:var(--paper);color:var(--ink3);font-size:11px;font-weight:600;cursor:pointer;transition:border-color .15s,color .15s}
.tb-out:hover{border-color:var(--red);color:var(--red)}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(165deg,var(--paper3) 0%,var(--brand-soft) 45%,var(--paper2) 100%)}
.login-box{width:380px;background:var(--paper);border-radius:var(--radius-lg);padding:36px;border:1px solid var(--line);box-shadow:var(--shadow-lg);animation:up .35s cubic-bezier(.16,1,.3,1)}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.login-logo-sq{width:40px;height:40px;background:var(--brand);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:700;font-size:15px;color:#fff;border:1px solid var(--brand-hover)}
.login-title{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--ink)}
.login-sub{font-size:12px;color:var(--ink3);margin-bottom:22px}
.field{margin-bottom:12px}
.field-label{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.field input,.field select{width:100%;padding:8px 10px;background:var(--paper2);border:1px solid var(--line2);border-radius:var(--radius);color:var(--ink);font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s}
.field input:focus,.field select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(31,122,98,.14)}
.field input::placeholder{color:var(--ink4)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:8px 16px;border-radius:var(--radius);border:none;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--brand);color:#fff;border:1px solid var(--brand-hover)}
.btn-primary:hover{background:var(--brand-hover)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed}
.btn-outline{background:var(--paper);color:var(--ink2);border:1px solid var(--line2)}
.btn-outline:hover{border-color:var(--brand);background:var(--brand-soft)}
.btn-ghost{background:transparent;color:var(--ink3);border:1px solid transparent}
.btn-ghost:hover{background:var(--paper3);border-color:var(--line)}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}
.btn-danger{background:var(--paper);color:var(--red);border:1px solid #fecaca}
.btn-danger:hover{background:var(--red-l)}
.admin-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.admin-actions{white-space:nowrap}
.modal-scroll{max-height:min(72vh,560px);overflow-y:auto;padding-right:6px;margin-right:-6px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.chip-blue{background:#e0ecf9;color:#1e4d8f}
.chip-teal{background:var(--teal-l);color:var(--teal)}
.chip-amber{background:var(--amber-l);color:var(--amber)}
.chip-green{background:var(--green-l);color:var(--green)}
.chip-gray{background:var(--paper3);color:var(--ink3);border:1px solid var(--line)}
.alert{padding:10px 12px;border-radius:var(--radius);font-size:12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:12px;border:1px solid transparent}
.alert-error{background:var(--red-l);color:var(--red);border-color:#fecaca}
.alert-success{background:var(--green-l);color:var(--green);border-color:#bbf7d0}
.spin{width:16px;height:16px;border:2px solid var(--line2);border-top-color:var(--brand);border-radius:50%;animation:rot .6s linear infinite;flex-shrink:0}
@keyframes rot{to{transform:rotate(360deg)}}
.calc-wrap{flex:1;display:flex;overflow:hidden;max-height:calc(100vh - 48px)}
.calc-left{width:400px;min-width:340px;background:var(--paper);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto}
.calc-right{flex:1;overflow-y:auto;padding:20px;background:var(--paper2);position:relative}
.panel-header{padding:14px 18px 12px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--paper) 0%,var(--paper2) 100%)}
.panel-title{font-family:var(--font-head);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--brand)}
.panel-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.form-inner{padding:14px 18px;display:flex;flex-direction:column;gap:0}
.sep{height:1px;background:var(--line);margin:12px 0}
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:300;background:var(--paper);border:1px solid var(--line2);border-radius:var(--radius);max-height:200px;overflow-y:auto;box-shadow:var(--shadow-lg)}
.ac-item{padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--line);transition:background .1s;font-size:12px}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--brand-soft)}
.ac-main{font-size:12px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:5px}
.ac-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.ac-empty{padding:12px;font-size:12px;color:var(--ink3);text-align:center}
.client-card{background:var(--paper2);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;margin-top:6px}
.client-card-name{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:5px}
.client-card-tags{display:flex;gap:5px;flex-wrap:wrap}
.result-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);animation:up .3s cubic-bezier(.16,1,.3,1)}
.result-head{padding:18px 20px;background:linear-gradient(135deg,#234d42 0%,var(--brand) 55%,#2a8a6f 100%);display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--brand-line)}
.result-head-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:4px}
.result-head-code{font-family:var(--font-head);font-size:22px;font-weight:700;color:#fff;letter-spacing:.02em}
.result-head-dest{font-size:11px;color:rgba(255,255,255,.82);margin-top:3px}
.result-total-label{font-size:9px;color:rgba(255,255,255,.65);text-align:right;text-transform:uppercase;letter-spacing:.08em}
.result-total-val{font-family:var(--font-head);font-size:28px;font-weight:700;color:#e8fff6;text-align:right;text-shadow:0 1px 2px rgba(0,0,0,.15)}
.result-grid{display:grid;grid-template-columns:1fr 1fr}
.result-section{padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper)}
.result-section:nth-child(odd){border-right:1px solid var(--line)}
.result-section-title{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--brand);margin-bottom:8px}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px dashed var(--line)}
.result-row:last-child{border-bottom:none}
.result-row-k{font-size:11px;color:var(--ink3)}
.result-row-v{font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--ink)}
.result-row.hl .result-row-k{color:var(--ink);font-weight:600}
.result-row.hl .result-row-v{color:var(--green);font-size:12px;font-weight:600}
.result-row.icms .result-row-v{color:var(--amber)}
.result-full{grid-column:1/-1;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper2)}
.result-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:linear-gradient(90deg,var(--brand-hover),var(--brand));border-top:1px solid var(--brand-line)}
.result-footer-k{font-size:12px;font-weight:700;color:#fff}
.result-footer-v{font-family:var(--font-head);font-size:22px;font-weight:700;color:#e8fff6}
.result-actions{padding:10px 18px;display:flex;gap:8px;border-top:1px solid var(--line);background:var(--paper)}
.result-card.preview .result-head-code.empty,.result-card.preview .result-total-val.empty{opacity:.42}
.result-row-v.is-ph{color:var(--ink4)}
.result-card.is-loading{opacity:.72;pointer-events:none}
.result-preview-hint{padding:10px 18px;background:var(--brand-soft);border-top:1px solid var(--brand-line);font-size:11px;color:var(--ink3);text-align:center}
.calc-right-loading{position:absolute;inset:0;background:rgba(239,245,242,.75);display:flex;align-items:center;justify-content:center;gap:10px;z-index:10;font-size:12px;color:var(--brand);font-weight:600}
.page-wrap{flex:1;padding:20px 22px;overflow-y:auto;background:var(--paper2)}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.page-title{font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--ink);text-transform:none;letter-spacing:0}
.erp-tab-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.erp-tab{font-weight:600}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filters input{padding:6px 10px;background:var(--paper);border:1px solid var(--line2);border-radius:var(--radius);color:var(--ink);font-family:var(--font);font-size:12px;outline:none}
.filters input:focus{border-color:var(--brand);box-shadow:0 0 0 2px rgba(31,122,98,.12)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
.erp-card{border-radius:var(--radius)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead{background:linear-gradient(180deg,var(--brand-soft) 0%,var(--paper3) 100%)}
.tbl-erp{border:1px solid var(--line)}
.tbl th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--brand-hover);border-bottom:2px solid var(--brand-line);white-space:nowrap}
.tbl td{padding:9px 12px;color:var(--ink);border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr.hist-row{cursor:pointer}
.tbl tbody tr.hist-row:hover{background:rgba(223,240,234,.65)}
.tbl-empty{text-align:center;color:var(--ink4);padding:28px!important;font-size:12px}
.mono{font-family:var(--font-mono);font-size:11px}
.val-pos{color:var(--brand-hover);font-family:var(--font-mono);font-weight:700}
.uf-tag{display:inline-block;padding:2px 6px;border-radius:2px;font-size:10px;font-weight:700;font-family:var(--font-mono)}
.uf-pr{background:#ede9fe;color:#5b21b6}
.uf-sc{background:#dbeafe;color:#1d4ed8}
.uf-rs{background:var(--green-l);color:var(--green)}
.pagination{display:flex;gap:6px;align-items:center;margin-top:12px;justify-content:center}
.pagination span{font-size:11px;color:var(--ink3);padding:0 6px}
.empty-tbl{display:flex;flex-direction:column;align-items:center;padding:40px;color:var(--ink4);gap:8px}
.modal-bg{position:fixed;inset:0;background:rgba(40,53,51,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--paper);border-radius:var(--radius-lg);width:100%;max-width:440px;padding:24px;border:1px solid var(--line);box-shadow:var(--shadow-lg);animation:up .25s cubic-bezier(.16,1,.3,1)}
.modal-title{font-family:var(--font-head);font-size:15px;font-weight:700;margin-bottom:16px;color:var(--ink)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.loading-row{display:flex;align-items:center;gap:10px;padding:36px;justify-content:center;color:var(--ink3);font-size:12px}
@media print{.topbar,.calc-left,.result-actions,.result-preview-hint,.filters,.pagination,.tb-nav,.tb-right{display:none!important}.calc-right,.page-wrap{padding:0!important}.result-card{box-shadow:none;border:1px solid #ccc}body{background:#fff}}
@media(max-width:800px){.calc-wrap{flex-direction:column;max-height:none}.calc-left{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--line)}.result-grid{grid-template-columns:1fr}.result-section:nth-child(odd){border-right:none}}
</style>

<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const {useState,useEffect,useRef,useCallback} = React;
const API_URL = window.location.protocol === 'file:'
  ? 'http://localhost:3001/api'
  : `${window.location.origin}/api`;

async function api(path,opts={},token=null){
  const headers={'Content-Type':'application/json'};
  if(token) headers['Authorization']=`Bearer ${token}`;
  const res=await fetch(API_URL+path,{...opts,headers:{...headers,...(opts.headers||{})}});
  let data;
  try{data=await res.json();}catch{
    throw new Error(res.ok?'Resposta inválida do servidor.':'Erro HTTP '+res.status);
  }
  if(!res.ok||data.sucesso===false)
    throw new Error(data.erro||('Erro HTTP '+res.status));
  return data;
}

const brl=v=>v==null?'—':'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const num3=v=>Number(v).toLocaleString('pt-BR',{minimumFractionDigits:3});
const dt=d=>new Date(d).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'});
const h=(tag,props,...ch)=>React.createElement(tag,props,...ch);

function useDebounce(val,delay){
  const [dv,setDv]=useState(val);
  useEffect(()=>{const t=setTimeout(()=>setDv(val),delay);return()=>clearTimeout(t);},[val,delay]);
  return dv;
}

function gerarPDF(resultado){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const prim=[31,122,98];const primEsc=[22,88,71];const preto=[40,53,49];const cinza=[95,116,108];const branco=[255,255,255];
  doc.setFillColor(...primEsc);doc.rect(0,0,210,35,'F');
  doc.setFillColor(...prim);doc.rect(0,35,210,2,'F');
  doc.setFillColor(...prim);doc.roundedRect(14,8,18,18,3,3,'F');
  doc.setTextColor(...branco);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('PF',23,20,{align:'center'});
  doc.setFontSize(18);doc.setFont('helvetica','bold');doc.text('PORTAL FRETE',40,16);
  doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text('Espelho de Frete',40,24);
  doc.setFontSize(9);doc.setTextColor(180,195,188);doc.text(new Date().toLocaleString('pt-BR'),196,20,{align:'right'});
  doc.setTextColor(...prim);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text('ESPELHO DE FRETE',14,48);
  doc.setTextColor(...preto);doc.setFontSize(22);doc.text(resultado.entrada.codigoM3,14,60);
  doc.setTextColor(...prim);doc.setFontSize(9);doc.text('TOTAL DO FRETE',196,48,{align:'right'});
  doc.setFontSize(22);doc.text(brl(resultado.totais.vlTotal),196,60,{align:'right'});
  doc.setDrawColor(...prim);doc.setLineWidth(0.5);doc.line(14,65,196,65);
  doc.setFillColor(248,250,252);doc.rect(14,68,85,65,'F');
  doc.setDrawColor(226,232,240);doc.setLineWidth(0.3);doc.rect(14,68,85,65);
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(...cinza);doc.text('DADOS DA OPERAÇÃO',18,76);
  const dadosOp=[
    ['Cliente',resultado.cliente.nome],
    ['Destino',`${resultado.destino.cidade} / ${resultado.destino.uf}`],
    ['Messorregião',resultado.destino.meso],
    ['Volume',`${num3(resultado.entrada.m3)} m³`],
    ['Valor da NF',brl(resultado.entrada.valorNF)],
    ['Tarifa R$/m³',`${resultado.tarifa.valorM3.toFixed(2)} · faixa ${resultado.tarifa.faixaMin}–${resultado.tarifa.faixaMax}`],
  ];
  let y=84;
  dadosOp.forEach(([k,v])=>{
    doc.setFont('helvetica','normal');doc.setTextColor(...cinza);doc.setFontSize(7.5);doc.text(k,18,y);
    doc.setFont('helvetica','bold');doc.setTextColor(...preto);doc.setFontSize(8);doc.text(String(v),18,y+5);
    y+=12;
  });
  doc.setFillColor(248,250,252);doc.rect(103,68,93,65,'F');
  doc.setDrawColor(226,232,240);doc.rect(103,68,93,65);
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(...cinza);doc.text('COMPONENTES DO FRETE',107,76);
  const comp=[
    ['Frete Peso',resultado.componentes.fretePeso],
    ['Ad Valorem (0,05%)',resultado.componentes.advalorem],
    ['Pedágio',resultado.componentes.pedagio],
  ];
  if(resultado.cliente.paletizado) comp.push(['Paletização (R$38,60/m³)',resultado.componentes.paletizacao]);
  if(resultado.cliente.dedicado)   comp.push(['Dedicado (+10%)',resultado.componentes.dedicado]);
  let yc=84;
  comp.forEach(([k,v])=>{
    doc.setFont('helvetica','normal');doc.setTextColor(...cinza);doc.setFontSize(7.5);doc.text(k,107,yc);
    doc.setFont('helvetica','bold');doc.setTextColor(...preto);doc.setFontSize(8);doc.text(brl(v),193,yc+5,{align:'right'});
    yc+=12;
  });
  const rY=140;
  doc.setFillColor(241,245,249);doc.rect(14,rY,182,30,'F');
  doc.setDrawColor(226,232,240);doc.rect(14,rY,182,30);
  doc.setFont('helvetica','bold');doc.setTextColor(...preto);doc.setFontSize(9);doc.text('Frete sem ICMS',18,rY+10);
  doc.setTextColor(21,128,61);doc.text(brl(resultado.totais.vlSemIcms),193,rY+10,{align:'right'});

function Autocomplete({label,placeholder,buscar,renderItem,getLabel,onSelect,resetKey}){
  const [q,setQ]=useState('');const [items,setItems]=useState([]);const [open,setOpen]=useState(false);const [loading,setLoading]=useState(false);
  const wrap=useRef(null);const dq=useDebounce(q,280);
  useEffect(()=>{setQ('');setItems([]);setOpen(false);},[resetKey]);
  useEffect(()=>{const hh=e=>{if(wrap.current&&!wrap.current.contains(e.target))setOpen(false)};document.addEventListener('mousedown',hh);return()=>document.removeEventListener('mousedown',hh);},[]);
  useEffect(()=>{
    if(dq.length<2){setItems([]);setOpen(false);return;}
    setLoading(true);
    buscar(dq).then(r=>{setItems(r);setOpen(r.length>0);}).catch(()=>{}).finally(()=>setLoading(false));
  },[dq]);
  const select=item=>{setQ(getLabel(item));setOpen(false);onSelect(item);};
  return h('div',{className:'field'},
    h('label',{className:'field-label'},label),
    h('div',{className:'ac-wrap',ref:wrap},
      h('div',{style:{position:'relative'}},
        h('input',{type:'text',placeholder,value:q,autoComplete:'off',onChange:e=>{setQ(e.target.value);if(e.target.value.length>1)setOpen(true)}}),
        loading&&h('div',{style:{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)'}},h('div',{className:'spin',style:{width:14,height:14}}))
      ),
      open&&items.length>0&&h('div',{className:'ac-drop'},items.map((item,i)=>h('div',{key:i,className:'ac-item',onMouseDown:()=>select(item)},renderItem(item)))),
      open&&items.length===0&&!loading&&dq.length>=2&&h('div',{className:'ac-drop'},h('div',{className:'ac-empty'},'Nenhum resultado'))
    )
  );
}

        await api(`/admin/tarifas/${tarifaModal.row.id}`,{method:'PUT',body:JSON.stringify({valor_m3:parseFloat(tarifaForm.valor_m3)})},token);
        setMsg('Tarifa atualizada.');
      }else{
        await api('/admin/tarifas',{method:'POST',body:JSON.stringify({
          meso_id:parseInt(tarifaForm.meso_id,10),
          faixa_min:parseFloat(tarifaForm.faixa_min),
          faixa_max:parseFloat(tarifaForm.faixa_max),
          valor_m3:parseFloat(tarifaForm.valor_m3),
        })},token);
        setMsg('Tarifa cadastrada.');
      }
      setTarifaModal(null);carregar();
    }catch(e){setMsg('Erro: '+e.message);}
  };

  const salvarCliente=async()=>{
    try{
      const body={
        cnpj:cliForm.cnpj,codigo:cliForm.codigo,loja:cliForm.loja||null,nome:cliForm.nome,
        nome_fantasia:cliForm.nome_fantasia||null,municipio:cliForm.municipio,uf:String(cliForm.uf||'').toUpperCase().slice(0,2),
        tipo_frete:cliForm.tipo_frete==='FOB'?'FOB':'CIF',
        paletizado:cliForm.paletizado?1:0,dedicado:cliForm.dedicado?1:0,
        cidade_id:cliForm.cidade_id||null,ativo:cliForm.ativo?1:0,
      };
      if(clienteModal.mode==='novo'){
        await api('/admin/clientes',{method:'POST',body:JSON.stringify(body)},token);
        setMsg('Cliente cadastrado.');
      }else{
        await api(`/admin/clientes/${cliForm.id}`,{method:'PUT',body:JSON.stringify(body)},token);
        setMsg('Cliente atualizado.');
      }
      setClienteModal(null);carregar();
    }catch(e){setMsg('Erro: '+e.message);}
  };

  const salvarUsuario=async()=>{
    try{
      if(usuarioModal.mode==='novo'){
        if(!usrForm.senha||usrForm.senha.length<6){setMsg('Erro: informe senha com pelo menos 6 caracteres.');return;}

          nome:usrForm.nome,login:usrForm.login.trim().toLowerCase(),email:usrForm.email,senha:usrForm.senha,perfil:usrForm.perfil||'user',
        })},token);
        setMsg('Usuário criado.');
      }else{
        await api(`/admin/usuarios/${usuarioModal.row.id}`,{method:'PUT',body:JSON.stringify({
          nome:usrForm.nome,perfil:usrForm.perfil,ativo:usrForm.ativo?1:0,
        })},token);
        setMsg('Usuário atualizado.');
      }
      setUsuarioModal(null);carregar();
    }catch(e){setMsg('Erro: '+e.message);}
  };

  const executarDelete=async()=>{
    if(!confirmDel)return;
    try{
      let path='/admin/';
      if(confirmDel.tipo==='tarifa')path+='tarifas/'+confirmDel.id;
      else if(confirmDel.tipo==='cliente')path+='clientes/'+confirmDel.id;
      else path+='usuarios/'+confirmDel.id;
      const data=await api(path,{method:'DELETE'},token);

      setConfirmDel(null);carregar();

  return h('div',{className:'page-wrap'},
    h('div',{className:'page-header'},h('span',{className:'page-title'},'Painel Administrativo')),

    toolbar,
    loading?h('div',{className:'loading-row'},h('div',{className:'spin'}),'Carregando…')
    :h('div',{className:'card erp-card'},
      h('table',{className:'tbl tbl-erp'},
        h('thead',null,h('tr',null,cols.map(c=>h('th',{key:c},c)))),
        h('tbody',null,bodyRows.length?bodyRows:[h('tr',{key:'empty'},h('td',{colSpan:Math.max(cols.length,1),className:'tbl-empty'},'Nenhum registro encontrado.'))])

    editItem&&h('div',{className:'modal-bg',onClick:e=>{if(e.target===e.currentTarget)setEditItem(null)}},
      h('div',{className:'modal-box'},

        h('div',{className:'field'},h('label',{className:'field-label'},'Valor por m³ (R$)'),h('input',{type:'number',step:'.01',value:editVal,onChange:e=>setEditVal(e.target.value)})),

        h('div',{className:'modal-footer'},h('button',{type:'button',className:'btn btn-ghost',onClick:()=>setEditItem(null)},'Cancelar'),h('button',{type:'button',className:'btn btn-primary',onClick:salvarPedagio},'Salvar'))

      h('div',{className:'modal-box'},
        h('div',{className:'modal-title'},tarifaModal.mode==='edit'?'Editar tarifa (vigência atual)':'Nova tarifa por faixa'),

            h('div',{className:'field-row'},
              h('div',{className:'field'},h('label',{className:'field-label'},'Faixa mín (m³)'),h('input',{type:'number',step:'.01',value:tarifaForm.faixa_min,onChange:e=>setTarifaForm(f=>({...f,faixa_min:e.target.value}))})),

          h('div',{className:'field'},h('label',{className:'field-label'},'Valor R$/m³'),h('input',{type:'number',step:'.0001',value:tarifaForm.valor_m3,onChange:e=>setTarifaForm(f=>({...f,valor_m3:e.target.value}))})),

          h('div',{className:'field-row'},
            h('div',{className:'field'},h('label',{className:'field-label'},'CNPJ'),h('input',{value:cliForm.cnpj||'',onChange:e=>setCliForm(f=>({...f,cnpj:e.target.value}))})),
            h('div',{className:'field'},h('label',{className:'field-label'},'Código'),h('input',{value:cliForm.codigo||'',onChange:e=>setCliForm(f=>({...f,codigo:e.target.value}))}))

          h('div',{className:'field'},h('label',{className:'field-label'},'Razão social'),h('input',{value:cliForm.nome||'',onChange:e=>setCliForm(f=>({...f,nome:e.target.value}))})),
          h('div',{className:'field'},h('label',{className:'field-label'},'Nome fantasia'),h('input',{value:cliForm.nome_fantasia||'',onChange:e=>setCliForm(f=>({...f,nome_fantasia:e.target.value}))})),

          h('div',{className:'field-row'},
            h('div',{className:'field'},h('label',{className:'field-label'},'Paletizado'),h('select',{value:cliForm.paletizado?'1':'0',onChange:e=>setCliForm(f=>({...f,paletizado:e.target.value==='1'}))},h('option',{value:'0'},'Não'),h('option',{value:'1'},'Sim'))),

          h('div',{className:'field'},h('label',{className:'field-label'},'Ativo'),h('select',{value:cliForm.ativo?'1':'0',onChange:e=>setCliForm(f=>({...f,ativo:e.target.value==='1'}))},h('option',{value:'1'},'Sim'),h('option',{value:'0'},'Não')))

      h('div',{className:'modal-box'},

        h('div',{className:'field'},h('label',{className:'field-label'},'Nome'),h('input',{value:usrForm.nome,onChange:e=>setUsrForm(f=>({...f,nome:e.target.value}))})),

function App(){
  const [token,setToken]=useState(()=>localStorage.getItem('frete_tk'));
  const [usuario,setUsuario]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('frete_usr')||'null');}catch{return null;}
  });
  const [tab,setTab]=useState('calc');const [refreshHist,setRefreshHist]=useState(0);
  const emptyForm={codigoM3:'',valorNF:'',m3:'',qtdePallets:''};
  const [calcForm,setCalcForm]=useState(emptyForm);
  const [calcCliente,setCalcCliente]=useState(null);
  const [calcCidade,setCalcCidade]=useState(null);
  const [calcResultado,setCalcResultado]=useState(null);
  const [calcResetKey,setCalcResetKey]=useState(0);
  const login=(tok,usr)=>{
    setToken(tok);setUsuario(usr);
    localStorage.setItem('frete_tk',tok);
    localStorage.setItem('frete_usr',JSON.stringify(usr));
  };
  const logout=()=>{
    localStorage.removeItem('frete_tk');localStorage.removeItem('frete_usr');
    setToken(null);setUsuario(null);setCalcForm(emptyForm);setCalcCliente(null);setCalcCidade(null);setCalcResultado(null);
  };
  if(!token||!usuario)return h(Login,{onLogin:login});
  return h('div',{className:'app-shell'},
    h('div',{className:'topbar'},
      h('div',{className:'tb-brand'},h('div',{className:'tb-logo'},'PF'),h('span',{className:'tb-name'},'Portal ',h('em',null,'Frete'))),
      h('div',{className:'tb-nav'},
        h('button',{type:'button',className:`tb-btn ${tab==='calc'?'on':''}`,onClick:()=>setTab('calc')},'Calcular'),
        h('button',{type:'button',className:`tb-btn ${tab==='hist'?'on':''}`,onClick:()=>{setTab('hist');setRefreshHist(r=>r+1);}},'Histórico'),
        usuario.perfil==='admin'&&h('button',{type:'button',className:`tb-btn ${tab==='admin'?'on':''}`,onClick:()=>setTab('admin')},'Admin')
      ),
      h('div',{className:'tb-right'},h('span',{className:'tb-chip'},usuario.nome),h('button',{type:'button',className:'tb-out',onClick:logout},'Sair'))
    ),
    tab==='calc'&&h(Calculadora,{token,onNovoCalculo:()=>setRefreshHist(r=>r+1),
      form:calcForm,setForm:setCalcForm,
      clienteSel:calcCliente,setClienteSel:setCalcCliente,
      cidadeSel:calcCidade,setCidadeSel:setCalcCidade,
      resultado:calcResultado,setResultado:setCalcResultado,
      resetKey:calcResetKey,setResetKey:setCalcResetKey}),
    tab==='hist'&&h(Historico,{token,refresh:refreshHist}),
    tab==='admin'&&usuario.perfil==='admin'&&h(Admin,{token,usuarioAtual:usuario})
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
